name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET Framework targeting packs
        # MSBuild and some WinUI/UWP NuGet build tasks resolve .NET Framework
        # reference assemblies at restore/compile time. Without the targeting
        # packs on the runner the build fails with MSB3644 ("reference assemblies
        # for .NETFramework,Version=v4.0 were not found").  Installing both the
        # 4.0 and 4.8 developer packs satisfies every reference-assembly lookup.
        shell: powershell
        run: choco install netfx-4.0-devpack netfx-4.8-devpack -y --no-progress

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish WinUI3CustomTitleBar/WinUI3CustomTitleBar.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=false

      - name: Zip output
        shell: pwsh
        run: |
          $publishDir = "WinUI3CustomTitleBar/bin/Release/net8.0-windows10.0.19041.0/${{ matrix.rid }}/publish"
          $zipName = "WinUI3CustomTitleBar-${{ matrix.rid }}.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinUI3CustomTitleBar-${{ matrix.rid }}
          path: WinUI3CustomTitleBar-${{ matrix.rid }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: WinUI3CustomTitleBar-*
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
