name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Publish
        run: >
          msbuild WinUI3CustomTitleBar/WinUI3CustomTitleBar.csproj
          /restore
          /t:Publish
          /p:Configuration=Release
          /p:RuntimeIdentifier=${{ matrix.rid }}
          /p:SelfContained=true
          /p:PublishSingleFile=false
          /p:WindowsPackageType=None
          /p:AppxPackage=false
          "/p:PublishDir=${{ github.workspace }}/WinUI3CustomTitleBar/publish/${{ matrix.rid }}/"

      - name: Zip output
        shell: pwsh
        run: |
          $publishDir = "WinUI3CustomTitleBar/publish/${{ matrix.rid }}"
          $zipName = "WinUI3CustomTitleBar-${{ matrix.rid }}.zip"
          if (-not (Test-Path -Path $publishDir -PathType Container)) {
            throw "Publish directory not found: $publishDir"
          }
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinUI3CustomTitleBar-${{ matrix.rid }}
          path: WinUI3CustomTitleBar-${{ matrix.rid }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: WinUI3CustomTitleBar-*
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
