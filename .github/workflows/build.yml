name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish WinUI3Print/WinUI3Print.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=false

      - name: Zip output
        shell: pwsh
        run: |
          $publishDir = "WinUI3Print/bin/Release/net8.0-windows10.0.19041.0/${{ matrix.rid }}/publish"
          $zipName = "WinUI3Print-${{ matrix.rid }}.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinUI3Print-${{ matrix.rid }}
          path: WinUI3Print-${{ matrix.rid }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: WinUI3Print-*
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
